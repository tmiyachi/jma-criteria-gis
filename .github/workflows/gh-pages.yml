name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: "pages"
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          # https://pypi.org/project/tippecanoe/で代替
          pip install tippecanoe==2.72.0

      - name: Cache downloaded tables
        id: cache-table
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: table/
          key: table-2026-05-08-${{ hashFiles('scripts/00_download_csv.sh') }}
          restore-keys: |
            table-

      - name: Download table
        if: steps.cache-table.outputs.cache-hit != 'true'
        run: scripts/00_download_csv.sh
        timeout-minutes: 30

      - name: Cache Data and Tiles
        id: cache-geodata
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            data/
            tiles/
          key: geodata-${{ hashFiles('scripts/01_*', 'scripts/02_*', 'table/**/*.csv') }}
          restore-keys: |
            geodata-

      - name: Generate data
        if: steps.cache-geodata.outputs.cache-hit != 'true'
        run: scripts/01_make_geojson.sh
        timeout-minutes: 30

      - name: Generate tiles
        if: steps.cache-geodata.outputs.cache-hit != 'true'
        run: scripts/02_make_tiles.sh
        timeout-minutes: 30

      - name: Build demo pages
        run: npm run build
        env:
          VITE_APP_BASE: /${{ github.event.repository.name }}/

      - name: Copy data and tiles
        run: |
          mkdir -p sample/dist/tiles
          mkdir -p sample/dist/data
          cp tiles/*.pmtiles tiles/*.json sample/dist/tiles/
          cp -r data/* sample/dist/data/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./sample/dist

  deploy:
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
